{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-body-tertiary">
                <div class="card-header bg-transparent border-0 pt-4">
                    <h4 class="fw-bold text-body-emphasis">
                        <i class="bi bi-pencil-square text-primary"></i> Editar Produto
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label small text-secondary fw-bold">Descrição</label>
                            <input type="text" name="descricao" class="form-control bg-transparent text-body" 
                                   value="{{ produto.descricao }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small text-secondary fw-bold">Preço de Venda (R$)</label>
                                <input type="number" step="0.01" name="preco" class="form-control bg-transparent text-body" 
                                       value="{{ produto.preco_venda|stringformat:'.2f' }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small text-secondary fw-bold">Stock Atual</label>
                                <input type="number" name="estoque" class="form-control bg-transparent text-body" 
                                       value="{{ produto.estoque_atual }}" required>
                            </div>
                        </div>

                        <div class="mb-4 p-3 rounded border {% if produto.ativo %}border-success-subtle bg-success-subtle{% else %}border-warning-subtle bg-warning-subtle{% endif %}">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="ativo" id="statusCheck" 
                                       {% if produto.ativo %}checked{% endif %}>
                                <label class="form-check-label fw-bold {% if produto.ativo %}text-success-emphasis{% else %}text-warning-emphasis{% endif %}" for="statusCheck">
                                    {% if produto.ativo %}Produto Ativo{% else %}Produto Bloqueado (Clique para Reativar){% endif %}
                                </label>
                            </div>
                            <small class="d-block text-muted mt-1">
                                Produtos inativos não aparecem na criação de novas OS.
                            </small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">Salvar Alterações</button>
                            <a href="{% url 'lista_estoque' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
