{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Oficina Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .card-login { width: 100%; max-width: 400px; padding: 15px; margin: auto; border: none; }
        .btn-login { background-color: #212529; color: white; }
        .btn-login:hover { background-color: #000; color: white; }
    </style>
</head>
<body>

<div class="card card-login shadow-lg">
    <div class="card-body text-center">
        <h3 class="fw-bold mb-3">OFICINA MASTER</h3>
        <p class="text-muted mb-4">Acesse sua conta para gerenciar as OS</p>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="id_username" placeholder="Usuário" required>
                <label for="id_username">Usuário</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control" id="id_password" placeholder="Senha" required>
                <label for="id_password">Senha</label>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger small py-2">Usuário ou senha incorretos.</div>
            {% endif %}

            <button class="btn btn-login w-100 btn-lg shadow-sm" type="submit">Entrar no Sistema</button>
        </form>
    </div>
</div>

</body>
</html>
